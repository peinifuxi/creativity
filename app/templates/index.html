<!DOCTYPE html>
<html>
<head>
    <title>标注页面</title>
</head>
<body>

    
    <!-- 导航 -->
    <a href="/">首页</a> | 
    <a href="/annotate">标注页面</a> | 
    <a href="/statistic">统计页面</a>| 
    <a href="/manage">管理页面</a> 
    <h1>上传裁判文书</h1>
    
    <form action="/casesubmit" method="POST">
        案例名称：<input type="text" name="name"><br>
        案例类型：
    <select name="sort">
        <option value="">请选择案件类型</option>
        <option value="刑事">刑事案件</option>
        <option value="民事">民事案件</option>
        <option value="行政">行政案件</option>
        <option value="其他">其他</option>
    </select><br><br>
        内容：<textarea name="content"></textarea><br>
        <input type="submit" value="提交">
    </form>
    
</body>
</html>
<style>
    body {
        background-color: #f0f8ff;
        font-family: Arial, sans-serif;
        margin: 20px;
        line-height: 1.6;
    }
    
    h1 {
        color: #2c5282;
    }
    
    form {
        background-color: white;
        padding: 20px;
        border-radius: 8px;
        border: 1px solid #a0c8f8;
        max-width: 600px;
    }
    
    input[type="text"], textarea, select {
        width: 100%;
        padding: 8px;
        margin: 8px 0 16px 0;
        border: 1px solid #a0c8f8;
        border-radius: 4px;
        box-sizing: border-box;
    }
    
    textarea {
        height: 200px;
        resize: vertical;
    }
    
    input[type="submit"] {
        background-color: #4299e1;
        color: white;
        border: none;
        padding: 10px 20px;
        border-radius: 4px;
        cursor: pointer;
        font-size: 16px;
    }
    
    input[type="submit"]:hover {
        background-color: #3182ce;
    }
    
    a {
        color: #3182ce;
        text-decoration: none;
    }
    
    a:hover {
        text-decoration: underline;
    }
</style>

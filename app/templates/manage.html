<!DOCTYPE html>
<html>
<body>
    <!-- 导航 -->
    <a href="/">首页</a> | 
    <a href="/annotate">标注页面</a> | 
    <a href="/statistic">统计页面</a>| 
    <a href="/manage">管理页面</a>

    <h1>案例管理</h1>
    
    <table border="1">
        <tr>
            <th>案例名称</th>
            <th>案例类型</th>
            <th>操作</th>
        </tr>
        {% for case in cases %}
        <tr>
            <td>{{ case.name }}</td>
            <td>{{ case.sort }}</td>
            <td>
                <a href="/annotate?case_id={{ case.id }}">查看</a>
                |
                <form action="/delete/{{ case.id }}" method="POST" style="display: inline;">
                    <button type="submit" onclick="return confirm('确定删除【{{ case.name }}】吗？')" 
                             background: none; border: none; cursor: pointer; text-decoration: underline; padding: 0;">
                        删除
                    </button>
                </form>
            </td>
        </tr>
        {% endfor %}
    </table>
    
    <p>共 {{ cases|length }} 条记录</p>
</body>
</html>
<style>
    body {
        background-color: #f0f8ff;
        font-family: Arial, sans-serif;
        margin: 20px;
        line-height: 1.6;
    }
    
    h1 {
        color: #2c5282;
    }
    
    table {
        width: 100%;
        border-collapse: collapse;
        margin: 20px 0;
        background-color: white;
        border: 1px solid #a0c8f8;
    }
    
    th {
        background-color: #ebf8ff;
        color: #2c5282;
        padding: 12px;
        text-align: left;
        border-bottom: 2px solid #a0c8f8;
    }
    
    td {
        padding: 10px;
        border-bottom: 1px solid #e2e8f0;
    }
    
    tr:hover {
        background-color: #f7fafc;
    }
    
    a {
        color: #3182ce;
        text-decoration: none;
    }
    
    a:hover {
        text-decoration: underline;
    }
    
    button {
        background-color: #f56565;
        color: white;
        border: none;
        padding: 4px 8px;
        border-radius: 3px;
        cursor: pointer;
        font-size: 14px;
    }
    
    button:hover {
        background-color: #e53e3e;
    }
</style>
